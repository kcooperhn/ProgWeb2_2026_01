<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Pantalla Primefaces</title>
    </h:head>
    <h:body>
        <h:messages globalOnly="true"/>
        <h:form prependId="false">
            <p:panel header="Registro de Clientes">
            <p:panelGrid columns="4" layout="grid" styleClass="ui-fluid">

                <p:outputLabel for="nombre">Primer Nombre</p:outputLabel>
                <p:inputText id="nombre" value="#{ClientesBean.nombre}" required="true" />

                <p:outputLabel for="apellido">Apellido</p:outputLabel>
                <p:inputText id="apellido" value="#{ClientesBean.apellido}" required="true"/>
            </p:panelGrid>
            <p:commandButton styleClass="ui-button-success" value="Guardar" action="#{ClientesBean.guardar}"/>
            </p:panel>
        </h:form>
    </h:body>
</html>
