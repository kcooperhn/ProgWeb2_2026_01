<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<f:view contentType="text/html;charset=UTF-8" encoding="UTF-8">
    <h:head>
        <title>Dashboard</title>
    </h:head>
    <h:body>
        <h1>Dashboard</h1>
        <h:form prependId="false">
        	<h:outputLabel for="nombre" value="Primer Nombre"/>
        	<h:inputText id="nombre" value="#{MiBean.nombre}" required="true" label="Nombre"/>
        
        	<h:outputLabel for="apellido" value="Apellido"/>
        	<h:inputText id="apellido" value="#{MiBean.apellido}" required="true" label="Apellido"/>
        	
        	<h:commandButton value="Realizar Calculo en Bean" action="#{MiBean.guardar}"/>
        </h:form>
        
        
    </h:body>
</f:view>
</html>
