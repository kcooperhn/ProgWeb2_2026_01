<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<f:view contentType="text/html;charset=UTF-8" encoding="UTF-8">
    <h:head>
        <title>Dashboard</title>
    </h:head>
    <h:body>
        <h1>Dashboard</h1>
        <h:messages globalOnly="true"/>
        <h:form prependId="false">
        
	        <div class="field">
		        <p:outputLabel for="nombre" styleClass="block">Primer Nombre</p:outputLabel>
		        <p:inputText id="nombre" value="#{ClientesBean.nombre}" required="true"
		         styleClass="block"/>
		        <small class="block">Enter your username to reset your password.</small>
		    </div>
		    
		    <div class="field">
		        <p:outputLabel for="apellido" styleClass="block">Apellido</p:outputLabel>
		        <p:inputText id="apellido" value="#{ClientesBean.apellido}" required="true"
		         styleClass="block"/>
		        <small class="block">Enter your username to reset your password.</small>
		    </div>
   
        	<p:commandButton styleClass="ui-button-success" 
        		value="Guardar" action="#{ClientesBean.guardar}"/>
        </h:form>
        
        
    </h:body>
</f:view>
</html>
